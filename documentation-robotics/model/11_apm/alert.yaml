  spec_node_id: apm.alert
  type: alert
  layer_id: apm
  name: WebSocket Disconnect Alert
  description: Warning alert triggered when the DR CLI WebSocket connection drops
    and falls back to REST-only polling mode; indicates the real-time model
    update channel is unavailable.
  attributes:
    severity: warning
    condition: connectionStore.status === 'rest-mode'
  source_reference:
    provenance: inferred
    locations:
      - file: src/apps/embedded/stores/connectionStore.ts
