  spec_node_id: apm.alert
  type: alert
  layer_id: apm
  name: Playwright Test Failure Alert
  description: Critical alert triggered when any Playwright test suite exits with
    failures; covers unit, integration, E2E, and auth test configs; indicates
    regression in core functionality.
  attributes:
    severity: critical
    condition: playwright test exit code not equals 0
  source_reference:
    provenance: inferred
    locations:
