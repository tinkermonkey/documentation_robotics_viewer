  layer_id: apm
  name: Storybook Story Render Error Alert
  description: Warning alert triggered when a Storybook story renders with console
    errors not in the approved filter list; detected by the test-runner
    storyErrorFilters.ts during CI story validation.
  attributes:
    severity: warning
    condition: story console error not in storyErrorFilters allowlist
  source_reference:
